name: daily-update

on:
  schedule:
    - cron: "30 22 * * *"   # UTC 22:30 = 北京时间06:30
  workflow_dispatch: {}      # 手动触发入口，部署后先手动跑一次验证

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # openpyxl服务于Excel报表导出（必需）；anthropic只服务于LLM简报，装失败不影响主流程
      - name: Install deps
        run: |
          pip install openpyxl
          pip install anthropic || true

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python src/fetch_jobs.py
          python src/parse_skills.py
          python src/export_excel.py
          python src/daily_brief.py
          python src/build_site.py

      - name: Commit and push
        run: |
          git config user.name "da-job-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs reports
          git commit -m "chore: daily update $(date -u +%F)" || echo "no changes"
          git push
